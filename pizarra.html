<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Pizarra con detección de mano</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      display: flex;
      flex-direction: row;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      background-color: #121212;
      font-family: 'Segoe UI', Arial, sans-serif;
      color: #f0f0f0;
      padding: 20px;
      gap: 20px;
    }

    h2 {
      font-weight: 500;
      color: #b0b0b0;
      font-size: 16px;
      margin-bottom: 16px;
    }

    #contenedor {
      position: relative;
      width: 800px;
      height: 500px;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.5);
      transform: scaleX(-1);
      background-color: #ffffff;
    }

    #video, #capaDeteccion, #capaDibujo {
      position: absolute;
      top: 0;
      left: 0;
      width: 800px;
      height: 500px;
    }

    #video {
      opacity: 0;
    }

    #capaDeteccion, #capaDibujo {
      background: transparent;
    }

    #controles {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 16px;
      background-color: #1e1e1e;
      padding: 20px 16px;
      border-radius: 12px;
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.4);
      min-width: 160px;
    }

    .grupo-control {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 8px;
    }

    .etiqueta {
      font-size: 13px;
      color: #888;
      margin-right: 4px;
    }

    #selectorCamara {
      background-color: #2a2a2a;
      color: #f0f0f0;
      border: 2px solid #3a3a3a;
      border-radius: 8px;
      padding: 6px 10px;
      font-size: 13px;
      cursor: pointer;
      max-width: 160px;
    }

    .color-boton {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      border: 2px solid transparent;
      cursor: pointer;
      transition: transform 0.15s ease, border-color 0.15s ease;
      padding: 0;
    }

    .color-boton:hover {
      transform: scale(1.15);
    }

    .color-boton.activo {
      border-color: #ffffff;
      transform: scale(1.15);
    }

    .colores-fila {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    #colorLibre {
      width: 32px;
      height: 32px;
      border: none;
      border-radius: 50%;
      cursor: pointer;
      background: none;
      padding: 0;
    }

    #colorLibre::-webkit-color-swatch-wrapper {
      padding: 0;
      border-radius: 50%;
      overflow: hidden;
    }

    #colorLibre::-webkit-color-swatch {
      border: 2px solid #555;
      border-radius: 50%;
    }

    #botonArcoiris {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      border: 2px solid #3a3a3a;
      background-color: #2a2a2a;
      font-size: 14px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.15s ease, border-color 0.15s ease;
      padding: 0;
    }

    #botonArcoiris:hover {
      transform: scale(1.15);
    }

    #botonArcoiris.activo {
      border-color: #ffffff;
      transform: scale(1.15);
    }

    .grosor-boton {
      background-color: #2a2a2a;
      border: 2px solid transparent;
      border-radius: 8px;
      width: 36px;
      height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: background-color 0.15s ease, border-color 0.15s ease;
    }

    .grosor-boton:hover {
      background-color: #3a3a3a;
    }

    .grosor-boton.activo {
      border-color: #4da6ff;
      background-color: #2d3f4f;
    }
    .trazo-boton {
      background-color: #2a2a2a;
      border: 2px solid transparent;
      border-radius: 8px;
      width: 36px;
      height: 36px;
      font-size: 16px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background-color 0.15s ease, border-color 0.15s ease;
      padding: 0;
    }

    .trazo-boton:hover {
      background-color: #3a3a3a;
    }

    .trazo-boton.activo {
      border-color: #4da6ff;
      background-color: #2d3f4f;
    }

    .grosor-punto {
      background-color: #f0f0f0;
      border-radius: 50%;
    }

    .grosores-fila {
      display: flex;
      gap: 6px;
    }

    #botonLimpiar {
      background-color: #3a1f1f;
      color: #ff6b6b;
      border: 2px solid #5a2c2c;
      border-radius: 8px;
      padding: 8px 16px;
      font-size: 14px;
      cursor: pointer;
      transition: background-color 0.15s ease;
      width: 100%;
    }

    #botonLimpiar:hover {
      background-color: #4a2525;
    }

    #estado {
      font-size: 12px;
      color: #888;
      margin: 0;
    }

    .separador {
      width: 100%;
      height: 1px;
      background-color: #333;
    }
  </style>
</head>
<body>

  <div id="contenedor">
    <video id="video" autoplay playsinline></video>
    <canvas id="capaDibujo" width="800" height="500"></canvas>
    <canvas id="capaDeteccion" width="800" height="500"></canvas>
  </div>

  <div id="controles">

    <div class="grupo-control">
      <span class="etiqueta">Cámara</span>
      <select id="selectorCamara"></select>
    </div>

    <div class="separador"></div>

    <div class="grupo-control">
      <span class="etiqueta">Color</span>
      <div class="colores-fila">
        <button class="color-boton activo" style="background-color:#000000" data-color="#000000"></button>
        <button class="color-boton" style="background-color:#ff4d4d" data-color="#ff4d4d"></button>
        <button class="color-boton" style="background-color:#4da6ff" data-color="#4da6ff"></button>
        <button class="color-boton" style="background-color:#4caf50" data-color="#4caf50"></button>
        <button class="color-boton" style="background-color:#ffd24d" data-color="#ffd24d"></button>
      
      </div>
      <div class="colores-fila">
        <input type="color" id="colorLibre" value="#000000" title="Elegir color libre">
        <button id="botonArcoiris" title="Ciclo de color automático">🌈</button>
      </div>
    </div>

    <div class="separador"></div>

    <div class="grupo-control">
      <span class="etiqueta">Grosor</span>
      <div class="grosores-fila">
        <button class="grosor-boton" data-grosor="2">
          <div class="grosor-punto" style="width:4px; height:4px;"></div>
        </button>
        <button class="grosor-boton activo" data-grosor="4">
          <div class="grosor-punto" style="width:8px; height:8px;"></div>
        </button>
        <button class="grosor-boton" data-grosor="8">
          <div class="grosor-punto" style="width:14px; height:14px;"></div>
        </button>
      </div>
    </div>

    <div class="separador"></div>

    <div class="grupo-control">
      <span class="etiqueta">Trazo</span>
      <div class="grosores-fila">
        <button class="trazo-boton activo" data-trazo="linea" title="Línea">〰️</button>
        <button class="trazo-boton" data-trazo="ramas" title="Ramas">🌿</button>
        <button class="trazo-boton" data-trazo="burbujas" title="Burbujas">⭕</button>
        <button class="trazo-boton" data-trazo="triangulos" title="Triángulos">△</button>
      </div>
    </div>
    <div class="separador"></div>

    <button id="botonLimpiar">🗑️ Limpiar</button>

    <p id="estado">Cargando MediaPipe...</p>

  </div>

  <script type="module">
    import { HandLandmarker, FilesetResolver } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14";

    const video = document.getElementById('video');
    const canvasDeteccion = document.getElementById('capaDeteccion');
    const ctxDeteccion = canvasDeteccion.getContext('2d');
    const canvasDibujo = document.getElementById('capaDibujo');
    const ctxDibujo = canvasDibujo.getContext('2d');
    const estado = document.getElementById('estado');

    let colorActual = '#000000';
    let modoArcoiris = false;
    let tonoActual = 0;
    let grosorActual = 4;
    let modoTrazo = 'linea';

    let handLandmarker = null;
    let ultimoTimestamp = -1;
    let streamActual = null;
    let bucleIniciado = false;

    let estadosManos = [
      { dibujando: false, ultimoX: null, ultimoY: null },
      { dibujando: false, ultimoX: null, ultimoY: null }
    ];

    // --- Controles de color ---
    const botonesColor = document.querySelectorAll('.color-boton');
    botonesColor.forEach((boton) => {
      boton.addEventListener('click', () => {
        colorActual = boton.dataset.color;
        modoArcoiris = false;
        document.getElementById('botonArcoiris').classList.remove('activo');
        botonesColor.forEach((b) => b.classList.remove('activo'));
        boton.classList.add('activo');
      });
    });

    const colorLibre = document.getElementById('colorLibre');
    colorLibre.addEventListener('input', () => {
      colorActual = colorLibre.value;
      modoArcoiris = false;
      document.getElementById('botonArcoiris').classList.remove('activo');
      botonesColor.forEach((b) => b.classList.remove('activo'));
    });

    // --- Botón modo arcoíris ---
    const botonArcoiris = document.getElementById('botonArcoiris');
    botonArcoiris.addEventListener('click', () => {
      modoArcoiris = !modoArcoiris;
      botonArcoiris.classList.toggle('activo', modoArcoiris);
    });

    // --- Controles de grosor ---
    const botonesGrosor = document.querySelectorAll('.grosor-boton');
    botonesGrosor.forEach((boton) => {
      boton.addEventListener('click', () => {
        grosorActual = parseInt(boton.dataset.grosor);
        botonesGrosor.forEach((b) => b.classList.remove('activo'));
        boton.classList.add('activo');
      });
    });
    // --- Controles de trazo ---
    const botonesTrazo = document.querySelectorAll('.trazo-boton');
    botonesTrazo.forEach((boton) => {
      boton.addEventListener('click', () => {
        modoTrazo = boton.dataset.trazo;
        botonesTrazo.forEach((b) => b.classList.remove('activo'));
        boton.classList.add('activo');
      });
    });

    // --- Botón limpiar ---
    document.getElementById('botonLimpiar').addEventListener('click', () => {
      ctxDibujo.clearRect(0, 0, canvasDibujo.width, canvasDibujo.height);
    });

    // --- Cámaras ---
    async function listarCamaras() {
      const dispositivos = await navigator.mediaDevices.enumerateDevices();
      const camaras = dispositivos.filter((d) => d.kind === 'videoinput');

      const selector = document.getElementById('selectorCamara');
      selector.innerHTML = '';

      camaras.forEach((camara, indice) => {
        const opcion = document.createElement('option');
        opcion.value = camara.deviceId;
        opcion.textContent = camara.label || `Cámara ${indice + 1}`;
        selector.appendChild(opcion);
      });

      selector.addEventListener('change', () => {
        activarCamara(selector.value);
      });
    }

    function activarCamara(deviceId) {
      if (streamActual) {
        streamActual.getTracks().forEach((track) => track.stop());
      }

      const restricciones = {
        video: deviceId ? { deviceId: { exact: deviceId } } : true
      };

      navigator.mediaDevices.getUserMedia(restricciones)
        .then((stream) => {
          streamActual = stream;
          video.srcObject = stream;
          video.addEventListener('loadeddata', () => {
            estado.textContent = "Señalá con el índice ☝️";
            if (!bucleIniciado) {
              bucleIniciado = true;
              requestAnimationFrame(detectarEnBucle);
            }
          }, { once: true });
        })
        .catch((error) => {
          console.error(error);
          estado.textContent = "Error al acceder a la cámara";
        });
    }

    // --- Dibujo con ruido ---
    const segmentosRuido = 8;
    const intensidadRuido = 6;

    function dibujarLineaConRuido(x1, y1, x2, y2) {
      ctxDibujo.beginPath();
      ctxDibujo.moveTo(x1, y1);

      for (let i = 1; i <= segmentosRuido; i++) {
        const t = i / segmentosRuido;
        const xIntermedio = x1 + (x2 - x1) * t;
        const yIntermedio = y1 + (y2 - y1) * t;
        const ruidoX = (Math.random() - 0.5) * intensidadRuido;
        const ruidoY = (Math.random() - 0.5) * intensidadRuido;
        ctxDibujo.lineTo(xIntermedio + ruidoX, yIntermedio + ruidoY);
      }

      ctxDibujo.strokeStyle = colorActual;
      ctxDibujo.lineWidth = grosorActual;
      ctxDibujo.lineCap = 'round';
      ctxDibujo.lineJoin = 'round';
      ctxDibujo.stroke();
    }
    function dibujarRamas(x1, y1, x2, y2) {
      // Línea principal con ruido
      ctxDibujo.beginPath();
      ctxDibujo.moveTo(x1, y1);
      ctxDibujo.lineTo(x2, y2);
      ctxDibujo.strokeStyle = colorActual;
      ctxDibujo.lineWidth = grosorActual;
      ctxDibujo.lineCap = 'round';
      ctxDibujo.stroke();

      // Ramitas que salen de la línea principal
      const cantRamas = 3;
      for (let i = 0; i < cantRamas; i++) {
        const t = (i + 1) / (cantRamas + 1);
        const px = x1 + (x2 - x1) * t;
        const py = y1 + (y2 - y1) * t;

        // Ángulo perpendicular a la dirección del trazo, con variación aleatoria
        const angulo = Math.atan2(y2 - y1, x2 - x1) + (Math.random() - 0.5) * Math.PI;
        const largo = 10 + Math.random() * 20;

        ctxDibujo.beginPath();
        ctxDibujo.moveTo(px, py);
        ctxDibujo.lineTo(
          px + Math.cos(angulo) * largo,
          py + Math.sin(angulo) * largo
        );
        ctxDibujo.lineWidth = Math.max(1, grosorActual * 0.5);
        ctxDibujo.stroke();
      }
    }

    function dibujarBurbujas(x, y) {
      // Varias burbujas de tamaño aleatorio alrededor del punto del dedo
      const cantBurbujas = 3;
      for (let i = 0; i < cantBurbujas; i++) {
        const offsetX = (Math.random() - 0.5) * 30;
        const offsetY = (Math.random() - 0.5) * 30;
        const radio = 3 + Math.random() * 12;

        ctxDibujo.beginPath();
        ctxDibujo.arc(x + offsetX, y + offsetY, radio, 0, 2 * Math.PI);
        ctxDibujo.strokeStyle = colorActual;
        ctxDibujo.lineWidth = Math.max(1, grosorActual * 0.5);
        ctxDibujo.stroke();
      }
    }

    function dibujarTriangulos(x, y) {
      // Triángulo aleatorio centrado en el punto del dedo
      const tamanio = 10 + Math.random() * 20;
      const angulo = Math.random() * Math.PI * 2;

      ctxDibujo.beginPath();
      for (let i = 0; i < 3; i++) {
        const a = angulo + (i * 2 * Math.PI) / 3;
        const px = x + Math.cos(a) * tamanio;
        const py = y + Math.sin(a) * tamanio;
        if (i === 0) ctxDibujo.moveTo(px, py);
        else ctxDibujo.lineTo(px, py);
      }
      ctxDibujo.closePath();
      ctxDibujo.strokeStyle = colorActual;
      ctxDibujo.lineWidth = grosorActual;
      ctxDibujo.stroke();
    }

    function esGestoDibujar(mano) {
      const puntaIndice = mano[8];
      const nudilloIndice = mano[6];
      const puntaMedio = mano[12];
      const nudilloMedio = mano[10];

      const indiceEstirado = puntaIndice.y < nudilloIndice.y;
      const medioDoblado = puntaMedio.y > nudilloMedio.y;

      return indiceEstirado && medioDoblado;
    }

    function detectarEnBucle() {
      const timestampActual = video.currentTime * 1000;

      if (timestampActual !== ultimoTimestamp) {
        ultimoTimestamp = timestampActual;

        // Si el modo arcoíris está activo, rotamos el color
        if (modoArcoiris) {
          tonoActual = (tonoActual + 2) % 360;
          colorActual = `hsl(${tonoActual}, 100%, 40%)`;
        }

        // Feedback: halo de 1-2 píxeles, casi imperceptible
        const cx = canvasDibujo.width / 2;
        const cy = canvasDibujo.height / 2;
        ctxDibujo.save();
        ctxDibujo.globalAlpha = 0.03;
        ctxDibujo.globalCompositeOperation = 'source-over';
        ctxDibujo.translate(cx, cy);
        ctxDibujo.scale(1.0005, 1.0005);
        ctxDibujo.rotate(0.0001);
        ctxDibujo.translate(-cx, -cy);
        ctxDibujo.drawImage(canvasDibujo, 0, 0);
        ctxDibujo.restore();
        ctxDibujo.globalAlpha = 1;
        ctxDibujo.globalCompositeOperation = 'source-over';
        const resultado = handLandmarker.detectForVideo(video, performance.now());
        ctxDeteccion.clearRect(0, 0, canvasDeteccion.width, canvasDeteccion.height);

        if (resultado.landmarks && resultado.landmarks.length > 0) {
          resultado.landmarks.forEach((mano, indiceMano) => {
            for (const punto of mano) {
              const x = punto.x * canvasDeteccion.width;
              const y = punto.y * canvasDeteccion.height;
              ctxDeteccion.beginPath();
              ctxDeteccion.arc(x, y, 4, 0, 2 * Math.PI);
              ctxDeteccion.fillStyle = '#00ff00';
              ctxDeteccion.fill();
            }

            const puntaIndice = mano[8];
            const x = puntaIndice.x * canvasDibujo.width;
            const y = puntaIndice.y * canvasDibujo.height;
            const estadoMano = estadosManos[indiceMano];

            if (esGestoDibujar(mano)) {
              ctxDeteccion.beginPath();
              ctxDeteccion.arc(x, y, 10, 0, 2 * Math.PI);
              ctxDeteccion.fillStyle = '#ff0000';
              ctxDeteccion.fill();

              if (estadoMano.dibujando && estadoMano.ultimoX !== null) {
                if (modoTrazo === 'linea') {
                  dibujarLineaConRuido(estadoMano.ultimoX, estadoMano.ultimoY, x, y);
                } else if (modoTrazo === 'ramas') {
                  dibujarRamas(estadoMano.ultimoX, estadoMano.ultimoY, x, y);
                } else if (modoTrazo === 'burbujas') {
                  dibujarBurbujas(x, y);
                } else if (modoTrazo === 'triangulos') {
                  dibujarTriangulos(x, y);
                }
              }

              estadoMano.dibujando = true;
              estadoMano.ultimoX = x;
              estadoMano.ultimoY = y;
            } else {
              estadoMano.dibujando = false;
              estadoMano.ultimoX = null;
              estadoMano.ultimoY = null;
            }
          });

          if (resultado.landmarks.length === 1) {
            estadosManos[1].dibujando = false;
            estadosManos[1].ultimoX = null;
            estadosManos[1].ultimoY = null;
          }
        } else {
          estadosManos[0].dibujando = false;
          estadosManos[0].ultimoX = null;
          estadosManos[0].ultimoY = null;
          estadosManos[1].dibujando = false;
          estadosManos[1].ultimoX = null;
          estadosManos[1].ultimoY = null;
        }
      }

      requestAnimationFrame(detectarEnBucle);
    }

    async function cargarMediaPipe() {
      const vision = await FilesetResolver.forVisionTasks(
        "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14/wasm"
      );

      handLandmarker = await HandLandmarker.createFromOptions(vision, {
        baseOptions: {
          modelAssetPath: "https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/1/hand_landmarker.task",
          delegate: "GPU"
        },
        runningMode: "VIDEO",
        numHands: 2
      });

      estado.textContent = "MediaPipe cargado. Activando cámara...";
      await listarCamaras();
      activarCamara();
    }

    cargarMediaPipe();
  </script>

</body>
</html>
